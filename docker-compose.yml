version: "3.9"

services:
  db:
    image: mariadb:10.6
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20

  wordpress:
    image: wordpress:6.6.2-php8.2-apache
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WP_DEBUG: "1"
      WP_DEBUG_LOG: "1"
      WP_HOME: http://localhost:8081
      WP_SITEURL: http://localhost:8081
    volumes:
      # Mount this repo (the theme folder) into the container's themes directory
      - ./:/var/www/html/wp-content/themes/dontworrycleaning
      # Persist uploads so you can add media locally
      - wp_uploads:/var/www/html/wp-content/uploads

volumes:
  db_data:
  wp_uploads:
